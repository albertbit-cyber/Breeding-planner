apply plugin: 'com.android.application'

android {
    namespace "com.breedingplanner.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.breedingplanner.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def keyProperties = new Properties()
            def keyPropertiesFile = rootProject.file("key.properties")
            if (keyPropertiesFile.exists()) {
                keyProperties.load(new FileInputStream(keyPropertiesFile))
            }

            def keystorePath = project.findProperty("BREEDING_PLANNER_KEYSTORE_FILE") ?: System.getenv("BREEDING_PLANNER_KEYSTORE_FILE") ?: keyProperties["storeFile"]
            def keystorePassword = project.findProperty("BREEDING_PLANNER_KEYSTORE_PASSWORD") ?: System.getenv("BREEDING_PLANNER_KEYSTORE_PASSWORD") ?: keyProperties["storePassword"]
            def releaseKeyAlias = project.findProperty("BREEDING_PLANNER_KEY_ALIAS") ?: System.getenv("BREEDING_PLANNER_KEY_ALIAS") ?: keyProperties["keyAlias"]
            def releaseKeyPassword = project.findProperty("BREEDING_PLANNER_KEY_PASSWORD") ?: System.getenv("BREEDING_PLANNER_KEY_PASSWORD") ?: keyProperties["keyPassword"]
            if (keystorePath && keystorePassword && releaseKeyAlias && releaseKeyPassword) {
                def keystoreFile = new File(keystorePath.toString())
                storeFile keystoreFile.isAbsolute() ? keystoreFile : rootProject.file(keystorePath)
                storePassword keystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            manifestPlaceholders = [usesCleartextTraffic: "false"]
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
            minifyEnabled project.hasProperty("enableReleaseOptimization")
            shrinkResources project.hasProperty("enableReleaseOptimization")
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lint {
        checkReleaseBuilds false
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
