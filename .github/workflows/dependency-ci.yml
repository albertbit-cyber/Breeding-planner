name: Dependency CI Foundation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Build, Test, and Deterministic E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: breeding_planner_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d breeding_planner_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/breeding_planner_ci?schema=public
      JWT_SECRET: ci-local-jwt-secret-change-for-real-deployments
      NODE_ENV: test
      CORS_ORIGIN: http://127.0.0.1:4173,http://127.0.0.1:4174
      E2E_BACKEND_URL: http://127.0.0.1:4000
      E2E_LAB_FRONTEND_URL: http://127.0.0.1:4173
      E2E_BREEDER_FRONTEND_URL: http://127.0.0.1:4174
      E2E_BREEDER_PASSWORD: breeder1234
      E2E_LAB_PASSWORD: demo1234

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            breeding-app-backend/package-lock.json
            breeding-app-shared/package-lock.json
            breeding-app-lab/package-lock.json
            breeding-app-breeder/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: breeding-app-backend

      - name: Install shared dependencies
        run: npm ci
        working-directory: breeding-app-shared

      - name: Install lab dependencies
        run: npm ci
        working-directory: breeding-app-lab

      - name: Install breeder dependencies
        run: npm ci
        working-directory: breeding-app-breeder

      - name: Install Playwright browsers
        run: |
          npm --prefix breeding-app-lab exec playwright install chromium
          npm --prefix breeding-app-breeder exec playwright install chromium

      - name: Prepare database
        run: |
          npm run prisma:generate
          npm run prisma:migrate:deploy
          npm run e2e:reset:local
        working-directory: breeding-app-backend

      - name: Backend tests and build
        run: |
          npm test
          npm run build
        working-directory: breeding-app-backend

      - name: Shared tests and build
        run: |
          npm test
          npm run build
        working-directory: breeding-app-shared

      - name: Lab tests and build
        run: |
          npm test
          npm run build
        working-directory: breeding-app-lab

      - name: Breeder tests and build
        run: |
          npm test
          npm run build
        working-directory: breeding-app-breeder

      - name: Lab deterministic E2E
        run: npm run test:e2e:reset
        working-directory: breeding-app-lab

      - name: Breeder deterministic E2E
        run: npm run test:e2e:reset
        working-directory: breeding-app-breeder

      - name: Upload Playwright reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            breeding-app-lab/playwright-report/
            breeding-app-lab/test-results/
            breeding-app-breeder/playwright-report/
            breeding-app-breeder/test-results/
