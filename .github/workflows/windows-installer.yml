name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $pkgVersion = node -p "require('./package.json').version"
          if ($tag -ne $pkgVersion) {
            Write-Error "Tag version '$tag' does not match package.json version '$pkgVersion'."
            exit 1
          }

      - name: Build Windows NSIS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.ref_name }}
          path: |
            dist/*Setup*.exe
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: error
