<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" fill="#F5F7FB"/>

  <rect x="40" y="40" width="1120" height="540" rx="22" fill="#FFFFFF" stroke="#D7DCE5"/>

  <text x="72" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1F2937">APPOINTMENTS</text>
  <text x="72" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6B7280">Manage pairing touchpoints</text>

  <rect x="690" y="70" width="180" height="44" rx="14" fill="#0EA5E9"/>
  <text x="780" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">Generate 5 months</text>

  <rect x="882" y="70" width="210" height="44" rx="14" fill="#0EA5E9"/>
  <text x="987" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">+ Add appointment</text>

  <!-- Header labels -->
  <text x="90" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Date</text>
  <text x="285" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Appointment</text>
  <text x="475" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Date of Pairing</text>
  <text x="715" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Lock</text>
  <text x="810" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Date of Lock</text>
  <text x="1020" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#374151">Notes</text>

  <!-- Row container -->
  <rect x="64" y="205" width="1072" height="78" rx="14" fill="#F9FAFB" stroke="#E5E7EB"/>

  <!-- Date input -->
  <rect x="80" y="223" width="170" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="96" y="249" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">07 / 03 / 2026</text>

  <!-- Appointment checkbox -->
  <rect x="286" y="233" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#94A3B8"/>
  <path d="M291 243L296 248L306 237" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pairing date -->
  <rect x="450" y="223" width="220" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="466" y="249" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">2026-03-02</text>

  <!-- Lock checkbox -->
  <rect x="716" y="233" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#94A3B8"/>

  <!-- Lock date -->
  <rect x="790" y="223" width="180" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="806" y="249" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9CA3AF">YYYY-MM-DD</text>

  <!-- Notes -->
  <rect x="992" y="223" width="130" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="1008" y="249" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9CA3AF">Notes</text>

  <!-- Row 2 for lock example -->
  <rect x="64" y="300" width="1072" height="78" rx="14" fill="#F9FAFB" stroke="#E5E7EB"/>
  <rect x="80" y="318" width="170" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="96" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">07 / 04 / 2026</text>

  <rect x="286" y="328" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#94A3B8"/>
  <path d="M291 338L296 343L306 332" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="450" y="318" width="220" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="466" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">2026-03-04</text>

  <rect x="716" y="328" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#94A3B8"/>
  <path d="M721 338L726 343L736 332" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="790" y="318" width="180" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="806" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">2026-03-05</text>

  <rect x="992" y="318" width="130" height="42" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="1008" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">Locked</text>

  <text x="72" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#111827">Interaction behavior preview</text>
  <text x="72" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">• Appointment checkbox marks the touchpoint complete.</text>
  <text x="72" y="496" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">• Pairing date is entered in “Date of Pairing”.</text>
  <text x="72" y="524" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">• Lock checkbox + “Date of Lock” records lock confirmation separately.</text>
</svg>
