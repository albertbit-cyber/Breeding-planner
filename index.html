<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="256x256" href="app-icons/icon_256x256.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Breeding planner advisor" />
    <link rel="apple-touch-icon" href="logo192.png" />
    <link rel="manifest" href="manifest.json" />
    <title>Breeding Planner</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="crash-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:99999;padding:20px;font:13px/1.5 monospace;overflow:auto;color:#c00;word-break:break-all"></div>
    <script>
      (function() {
        var overlay = document.getElementById('crash-overlay');
        function show(msg) { overlay.style.display='block'; overlay.textContent = msg; }
        window.addEventListener('error', function(e) {
          show('JS Error: ' + e.message + '\n' + (e.filename||'') + ':' + e.lineno + '\n' + (e.error&&e.error.stack||''));
        });
        window.addEventListener('unhandledrejection', function(e) {
          show('Unhandled Promise: ' + (e.reason&&e.reason.message||String(e.reason)) + '\n' + (e.reason&&e.reason.stack||''));
        });
        window.__showCrash = show;
      })();
    </script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
